<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Jugnu">
  <defs>
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#e8ecf4"/>
      <stop offset="100%" stop-color="#aab4c8"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff8d0"/>
      <stop offset="45%" stop-color="#e9e15e"/>
      <stop offset="100%" stop-color="#e9e15e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="200" height="200" rx="44" fill="#0d1117"/>

  <!-- J: top bar, stem, hook -->
  <path d="M 78 52 L 138 52"
        stroke="url(#stem)" stroke-width="20" stroke-linecap="round" fill="none"/>
  <path d="M 118 52 L 118 122 Q 118 152 88 152 Q 64 152 58 132"
        stroke="url(#stem)" stroke-width="20" stroke-linecap="round" fill="none"/>

  <!-- terminal glow -->
  <circle cx="55" cy="124" r="17" fill="url(#dot)"/>
  <circle cx="55" cy="124" r="5"  fill="#f4eda0"/>
</svg>
