<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200" role="img" aria-label="Jugnu">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8f26e" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#b6e94a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b6e94a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="200" rx="12" fill="#10141f"/>

  <!-- glow halo -->
  <circle cx="150" cy="118" r="58" fill="url(#glow)"/>

  <!-- pixel firefly: 8px grid, side view, abdomen lit -->
  <g shape-rendering="crispEdges">
    <!-- antennae -->
    <rect x="196" y="58" width="8" height="8" fill="#3b4252"/>
    <rect x="204" y="50" width="8" height="8" fill="#3b4252"/>
    <rect x="180" y="54" width="8" height="8" fill="#3b4252"/>
    <!-- head -->
    <rect x="180" y="66" width="16" height="16" fill="#242b3a"/>
    <rect x="184" y="70" width="8" height="8" fill="#0b0e14"/>
    <!-- thorax -->
    <rect x="156" y="74" width="24" height="24" fill="#2e3647"/>
    <!-- wing (upper, raised) -->
    <rect x="140" y="46" width="40" height="8" fill="#6f87a8" opacity="0.55"/>
    <rect x="132" y="54" width="44" height="8" fill="#8fa8c8" opacity="0.45"/>
    <rect x="140" y="62" width="32" height="8" fill="#6f87a8" opacity="0.35"/>
    <!-- abdomen (lit segments) -->
    <rect x="124" y="86" width="32" height="24" fill="#9fd63a"/>
    <rect x="108" y="94" width="16" height="16" fill="#d8f26e"/>
    <rect x="100" y="98" width="8"  height="8"  fill="#f4ffb0"/>
    <!-- legs -->
    <rect x="160" y="98" width="8" height="12" fill="#3b4252"/>
    <rect x="172" y="98" width="8" height="16" fill="#3b4252"/>
  </g>

  <!-- wordmark -->
  <text x="280" y="102" font-family="Menlo, SFMono-Regular, Consolas, monospace" font-size="44" font-weight="700" fill="#e8ecf4">jugnu</text>
  <text x="282" y="136" font-family="Menlo, SFMono-Regular, Consolas, monospace" font-size="16" fill="#8b93a7">a 35B model on a 16 GB laptop</text>
</svg>
